# Table frame convention:
# - XYZ are expressed in mm
# - RPY are expressed in degrees
# - roll = 0   -> palm facing upward
# - roll = 90  -> palm facing forward (towards human)
# - yaw = 0    -> high-five orientation
# - yaw = 90   -> handshake orientation
steps:
  - name: handshake_ready
    target_xyz_mm: [500.0, -200.0, 650.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [20.0, -70.0, 95.0, -115.0, -90.0, 20.0]
    execute: true

  - name: handshake_forward
    target_xyz_mm: [600.0, -200.0, 650.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [25.0, -65.0, 90.0, -115.0, -90.0, 25.0]
    execute: true